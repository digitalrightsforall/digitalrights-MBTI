name: Deploy to AliCloud ECS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd src/web-app
          npm install

      - name: Build Project
        run: |
          cd src/web-app
          npm run build

      - name: Deploy to ECS
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          sed -i '$a\' ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # 核心修复：修正 TARGET 路径并确保 SOURCE 指向正确的 out 文件夹
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa" \
            src/web-app/out/ \
            ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}:/var/www/digitalrights-mbti
