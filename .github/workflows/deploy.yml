name: Deploy to AliCloud ECS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd src/web-app
          npm install

      - name: Build Project
        run: |
          cd src/web-app
          npm run build

      - name: Deploy to ECS
        run: |
          # 1. 准备 SSH 目录
          mkdir -p ~/.ssh
          
          # 2. 将私钥写入文件并确保格式（自动添加末尾换行符）
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          sed -i '$a\' ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # 3. 执行同步 (使用标准 rsync)
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa" \
            src/web-app/out/ \
            ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}:/var/www/digital-rights-mbti
